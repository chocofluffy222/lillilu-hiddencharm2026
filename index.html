        const SimplePieChart = ({ data, activeId, onTouch }) => {
            const total = data.reduce((sum, item) => sum + item.value, 0);
            let cumulativeValue = 0;

            const getCoordinatesForPercent = (percent) => {
                const x = Math.cos(2 * Math.PI * percent);
                const y = Math.sin(2 * Math.PI * percent);
                return [x, y];
            };

            return (
                <div className="relative w-64 h-64 mx-auto">
                    <svg viewBox="-1 -1 2 2" style={{ transform: 'rotate(-90deg)' }} className="w-full h-full overflow-visible">
                        {data.map((slice, index) => {
                            const startPercent = cumulativeValue / total;
                            const value = slice.value;
                            cumulativeValue += value;
                            const endPercent = cumulativeValue / total;

                            if (value === total) {
                                return <circle key={slice.id} cx="0" cy="0" r="1" fill={slice.color} onClick={() => onTouch(slice)} />;
                            }

                            const [startX, startY] = getCoordinatesForPercent(startPercent);

                            const pathData = `M 0 0 L ${startX} ${startY} A 1 1 0 ${largeArcFlag} 1 ${endX} ${endY} Z`;

        lillilu: "🤡",
        rosie: "🐰",
        finn: "🐸",
        bonbon: "🐻",
        espie: "🐘",
        gigi: "🦒",
        levy: "🦄"
    };

        .sort((a, b) => b[1] - a[1])
        .map(([key, value]) => {
            const percent = Math.round((value / 7) * 100);

            return `${emojiMap[key]} ${CHARACTERS[key].nameJp}：${percent}%`;
        })
        .join("\n");

    const text = `私のタイプは【${resultChar.nameJp}】でした✨

🌸隠れた魅力
${resultChar.hiddenCharm}

📊あなたの中にいる仲間たち
${ranking}

    const url = window.location.href;

    if (platform === "line") {
        try {
            // cover.pngを読み込む
            const response = await fetch("cover.png");

            if (!response.ok) {
                throw new Error("cover.pngを読み込めませんでした");
            }

            const blob = await response.blob();

            // 画像を共有用ファイルに変換
            const imageFile = new File(
                [blob],
                "LilLilu-diagnosis-cover.png",
                {
                    type: blob.type || "image/png"
                }
            );

            const shareData = {
                title: "ピエロのリルリルと仲間たち診断",
                text: text,
                url: url,
                files: [imageFile]
            };

            // 画像付き共有に対応している場合
            if (
                navigator.share &&
                navigator.canShare &&
                navigator.canShare({ files: [imageFile] })
            ) {
                await navigator.share(shareData);
                return;
            }

            // 画像付き共有に対応していない場合はテキスト共有
            const lineText = `${text}\n\n${url}`;

            window.open(
                `https://line.me/R/msg/text/?${encodeURIComponent(lineText)}`,
                "_blank"
            );

        } catch (error) {
            console.error(error);

            // エラー時もテキスト共有に切り替える
            const lineText = `${text}\n\n${url}`;

            window.open(
                `https://line.me/R/msg/text/?${encodeURIComponent(lineText)}`,
                "_blank"
            );
        }

        return;
    }

    if (platform === "threads") {
        const threadsText = `${text}\n\n${url}`;

        window.open(
            `https://www.threads.net/intent/post?text=${encodeURIComponent(
                threadsText
            )}`,
            "_blank"
        );

        return;
    }

    if (platform === "instagram") {
        alert("スクリーンショットを撮ってストーリーにシェアしてね！");
    }
};
